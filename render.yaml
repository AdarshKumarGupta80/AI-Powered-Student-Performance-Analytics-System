services:

  - type: web
    name: student-ml-service
    runtime: python
    rootDir: ML-Service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: student-ai-backend
    runtime: docker
    rootDir: Student-AI-Backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false        # Set manually: jdbc:postgresql://host:5432/studentai
      - key: DB_USERNAME
        fromDatabase:
          name: student-ai-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: student-ai-db
          property: password
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRATION
        value: "3600000"
      - key: GROK_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: ML_SERVICE_URL
        sync: false        # Set manually: https://student-ml-service.onrender.com
      - key: FRONTEND_URL
        sync: false        # Set manually after frontend deploys

  - type: web
    name: student-ai-frontend
    runtime: docker
    rootDir: Student-AI-Frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        sync: false        # Set manually: https://student-ai-backend.onrender.com

databases:
  - name: student-ai-db
    plan: free
    databaseName: studentai
    user: studentai