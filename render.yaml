# =============================================================
# render.yaml — AI-Powered Student Performance Analytics System
# =============================================================
# Deploy order: database → ml-service → backend → frontend
# After first deploy, update FRONTEND_URL in backend env vars.
# =============================================================

services:

  # ── 1. ML Service (Python / FastAPI) ──────────────────────
  - type: web
    name: student-ml-service
    runtime: python
    rootDir: ML-Service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── 2. Backend (Java / Spring Boot — Docker) ─────────────
  - type: web
    name: student-ai-backend
    runtime: docker
    rootDir: Student-AI-Backend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: student-ai-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: student-ai-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: student-ai-db
          property: password
      - key: JWT_SECRET_KEY
        generateValue: false
      - key: JWT_EXPIRATION
        value: "3600000"
      - key: GROK_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: ML_SERVICE_URL
        fromService:
          name: student-ml-service
          type: web
          property: host
      
  # ── 3. Frontend (React → Nginx — Docker) ──────────────────
  - type: web
    name: student-ai-frontend
    runtime: docker
    rootDir: Student-AI-Frontend
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: student-ai-backend
          type: web
          property: host

# ── PostgreSQL Database ────────────────────────────────────
databases:
  - name: student-ai-db
    plan: free
    databaseName: studentai
    user: studentai